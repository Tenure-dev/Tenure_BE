spring:
  application:
    name: tenure-be

  datasource:
    url: jdbc:postgresql://localhost:5432/Tenure_DB
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  sql:
    init:
      platform: postgresql

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

server:
  port: 8080

tenure:
  storage:
    local:
      base-dir: ${STORAGE_BASE_DIR:./uploads}
      base-url: ${STORAGE_BASE_URL:/files}
  trade:
    auto-confirm:
      interval-minutes: 10
      confirm-hours: 72